<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدير المصاريف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: sans-serif; }</style>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-5 text-blue-900">مدير المصاريف الذكي</h1>

        <div class="grid grid-cols-3 gap-4 mb-5 text-center">
            <div class="bg-white p-4 rounded shadow border-b-4 border-blue-500">
                <p class="text-sm text-gray-500">الدخل</p>
                <div class="flex justify-around items-center">
                    <span id="income-val" class="font-bold">0</span>
                    <button onclick="changeIncome()" class="text-xs bg-blue-100 px-1 rounded">تعديل</button>
                </div>
            </div>
            <div class="bg-white p-4 rounded shadow border-b-4 border-red-500">
                <p class="text-sm text-gray-500">المصاريف</p>
                <span id="expense-val" class="font-bold text-red-600">0</span>
            </div>
            <div class="bg-white p-4 rounded shadow border-b-4 border-green-500">
                <p class="text-sm text-gray-500">المتبقي</p>
                <span id="remaining-val" class="font-bold text-green-600">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="bg-white p-5 rounded shadow">
                <form id="expense-form" class="space-y-3">
                    <input type="text" id="title" placeholder="اسم المصروف" class="w-full p-2 border rounded" required>
                    <input type="number" id="amount" placeholder="المبلغ" class="w-full p-2 border rounded" required>
                    <select id="category" class="w-full p-2 border rounded">
                        <option value="طعام">طعام</option>
                        <option value="مواصلات">مواصلات</option>
                        <option value="سكن">سكن</option>
                        <option value="ترفيه">ترفيه</option>
                    </select>
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">إضافة</button>
                </form>
                <button onclick="resetAll()" class="w-full mt-4 bg-red-100 text-red-600 p-2 rounded text-sm font-bold border border-red-200">
                    ⚠️ تصفير كل البيانات
                </button>
            </div>
            <div class="bg-white p-5 rounded shadow">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="mt-5 bg-white rounded shadow">
            <table class="w-full text-right border-collapse">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-3">المصروف</th>
                        <th class="p-3">المبلغ</th>
                        <th class="p-3 text-center">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="expense-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let chart;

        async function updateDashboard() {
            const res = await fetch(`${API_URL}/report`);
            const d = await res.json();
            document.getElementById('income-val').innerText = d.total_income;
            document.getElementById('expense-val').innerText = d.total_expenses;
            document.getElementById('remaining-val').innerText = d.remaining_balance;
            renderTable();
            updateChart();
        }

        async function renderTable() {
            const res = await fetch(`${API_URL}/expenses`);
            const data = await res.json();
            const tbody = document.getElementById('expense-table-body');
            tbody.innerHTML = data.map(e => `
                <tr class="border-t">
                    <td class="p-3">${e.title}</td>
                    <td class="p-3 font-bold">${e.amount}</td>
                    <td class="p-3 text-center">
                        <button onclick="editExp(${e.id},'${e.title}',${e.amount},'${e.category}')" class="text-blue-500 mx-2">تعديل</button>
                        <button onclick="deleteExp(${e.id})" class="text-red-500">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        async function resetAll() {
            if(confirm("حذف كل السجلات؟")) {
                await fetch(`${API_URL}/reset-all`, { method: 'DELETE' });
                updateDashboard();
            }
        }

        async function deleteExp(id) {
            await fetch(`${API_URL}/delete-expense/${id}`, { method: 'DELETE' });
            updateDashboard();
        }

        async function editExp(id, t, a, c) {
            const nt = prompt("الاسم الجديد:", t);
            const na = prompt("المبلغ الجديد:", a);
            if(nt && na) {
                await fetch(`${API_URL}/update-expense/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: nt, amount: parseFloat(na), category: c})
                });
                updateDashboard();
            }
        }

        async function changeIncome() {
            const v = prompt("الدخل الجديد:");
            if(v) {
                await fetch(`${API_URL}/update-income?amount=${v}`, { method: 'POST' });
                updateDashboard();
            }
        }

        async function updateChart() {
            const res = await fetch(`${API_URL}/chart-data`);
            const d = await res.json();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: d.labels, datasets: [{ data: d.data, backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b'] }] }
            });
        }

        document.getElementById('expense-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(`${API_URL}/add-expense`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    category: document.getElementById('category').value
                })
            });
            document.getElementById('expense-form').reset();
            updateDashboard();
        };

        updateDashboard();
    </script>
</body>
</html>
